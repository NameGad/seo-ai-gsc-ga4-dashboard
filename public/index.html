<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GSC JS Dashboard</title>
  <style>
    :root{
      color-scheme: light;
      --bg:#f6f7f9;
      --surface:#ffffff;
      --surface-2:#f1f5f7;
      --ink:#151922;
      --muted:#667085;
      --line:#d9e1e7;
      --line-soft:#edf1f4;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --teal:#0f766e;
      --amber:#b45309;
      --rose:#be123c;
      --shadow:0 16px 44px rgba(25,35,52,.08);
      --radius:8px;
      --control-h:42px;
    }
    *{box-sizing:border-box}
    html{min-width:320px}
    body{
      margin:0;
      min-height:100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,.86), rgba(246,247,249,.98) 280px),
        radial-gradient(circle at 0 0, rgba(37,99,235,.10), transparent 340px),
        var(--bg);
      color:var(--ink);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      letter-spacing:0;
    }
    button,input,select{font:inherit}
    button{
      min-height:var(--control-h);
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--ink);
      border-radius:var(--radius);
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      transition:background .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease;
      white-space:nowrap;
    }
    button:hover{border-color:#b9c6d1;box-shadow:0 8px 18px rgba(25,35,52,.08);transform:translateY(-1px)}
    button:disabled{cursor:not-allowed;opacity:.58;transform:none;box-shadow:none}
    button svg{width:17px;height:17px;stroke-width:2}
    .primary{
      border-color:var(--blue);
      background:var(--blue);
      color:#fff;
      box-shadow:0 12px 28px rgba(37,99,235,.20);
    }
    .primary:hover{background:var(--blue-dark);border-color:var(--blue-dark)}
    .shell{width:min(1480px,calc(100% - 40px));margin:0 auto;padding:24px 0 40px}
    .topbar{
      display:grid;
      grid-template-columns:minmax(220px,1fr) auto;
      gap:16px;
      align-items:center;
      margin-bottom:18px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-mark{
      width:42px;height:42px;border-radius:8px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      color:#fff;
      box-shadow:0 12px 26px rgba(15,118,110,.18);
      flex:0 0 auto;
    }
    .brand-mark svg{width:22px;height:22px}
    h1{font-size:22px;line-height:1.1;margin:0;font-weight:720}
    .subline{margin-top:4px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status{
      min-height:36px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      justify-self:end;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.76);
      color:var(--muted);
      font-size:13px;
      backdrop-filter:blur(14px);
      max-width:min(560px,100%);
    }
    .status svg{width:16px;height:16px;flex:0 0 auto}
    .status span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .status.error{border-color:#fecdd3;background:#fff1f2;color:var(--rose)}
    .status.success{border-color:#bbf7d0;background:#f0fdf4;color:#166534}
    .toolbar{
      background:rgba(255,255,255,.82);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      display:grid;
      grid-template-columns:1.35fr 1.15fr repeat(2,minmax(150px,.5fr)) auto auto auto;
      gap:10px;
      align-items:end;
      backdrop-filter:blur(18px);
      margin-bottom:16px;
    }
    label{display:grid;gap:7px;min-width:0;color:var(--muted);font-size:12px;font-weight:650}
    input,select{
      width:100%;
      min-height:var(--control-h);
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--surface);
      color:var(--ink);
      padding:0 12px;
      outline:none;
      transition:border-color .18s ease,box-shadow .18s ease,background .18s ease;
    }
    input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    .metrics{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .metric{
      min-height:118px;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 12px 32px rgba(25,35,52,.06);
      padding:16px;
      display:grid;
      align-content:space-between;
      overflow:hidden;
      position:relative;
    }
    .metric:before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height:3px;
      background:var(--accent,var(--blue));
    }
    .metric-head{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;font-weight:700}
    .metric-icon{width:32px;height:32px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;color:var(--accent,var(--blue));flex:0 0 auto}
    .metric-icon svg{width:18px;height:18px}
    .metric-value{font-size:30px;line-height:1.05;font-weight:760;letter-spacing:0;margin-top:16px;word-break:break-word}
    .workspace{
      display:grid;
      grid-template-columns:minmax(0,1.35fr) minmax(380px,.65fr);
      gap:16px;
      align-items:start;
    }
    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 12px 34px rgba(25,35,52,.06);
      overflow:hidden;
      min-width:0;
    }
    .panel-head{
      min-height:54px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border-bottom:1px solid var(--line-soft);
    }
    .panel-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:740;min-width:0}
    .panel-title svg{width:18px;height:18px;color:var(--blue);flex:0 0 auto}
    .panel-meta{color:var(--muted);font-size:12px;white-space:nowrap}
    .chart-wrap{height:370px;padding:12px 16px 18px}
    #trendChart{width:100%;height:100%}
    .tables{
      display:grid;
      gap:16px;
      margin-top:16px;
    }
    .table-wrap{max-height:420px;overflow:auto}
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:#f8fafc;
      color:#475467;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.04em;
      text-align:left;
      border-bottom:1px solid var(--line);
      padding:10px 12px;
      white-space:nowrap;
    }
    tbody td{
      border-bottom:1px solid var(--line-soft);
      padding:10px 12px;
      vertical-align:top;
      color:#293241;
      max-width:520px;
      overflow-wrap:anywhere;
    }
    tbody tr:hover td{background:#f8fbfd}
    td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
    .empty{padding:28px 16px;color:var(--muted);text-align:center;font-size:13px}
    .pill{
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#f8fafc;
      font-size:12px;
      color:#344054;
      white-space:nowrap;
    }
    .side-stack{display:grid;gap:16px}
    @media (max-width:1180px){
      .toolbar{grid-template-columns:1fr 1fr repeat(2,minmax(145px,.5fr));}
      .toolbar button{width:100%}
      .workspace{grid-template-columns:1fr}
      .side-stack{grid-template-columns:1fr 1fr}
    }
    @media (max-width:820px){
      .shell{width:min(100% - 24px,1480px);padding-top:16px}
      .topbar{grid-template-columns:1fr}
      .status{justify-self:stretch;border-radius:var(--radius)}
      .toolbar{grid-template-columns:1fr}
      .metrics{grid-template-columns:1fr 1fr}
      .side-stack{grid-template-columns:1fr}
      .chart-wrap{height:300px}
    }
    @media (max-width:520px){
      .metrics{grid-template-columns:1fr}
      .brand{align-items:flex-start}
      h1{font-size:20px}
      .subline{white-space:normal}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><i data-lucide="line-chart"></i></div>
        <div>
          <h1>GSC JS Dashboard</h1>
          <div class="subline" id="activeProperty">No property selected</div>
        </div>
      </div>
      <div id="status" class="status"><i data-lucide="activity"></i><span>Ready</span></div>
    </header>

    <section class="toolbar" aria-label="Controls">
      <label>Site URL
        <input id="siteUrl" type="text" placeholder="https://www.example.com/ or sc-domain:example.com" autocomplete="off">
      </label>
      <label>GSC Property
        <select id="siteSelect"><option value="">Manual input</option></select>
      </label>
      <label>Start Date
        <input id="startDate" type="date">
      </label>
      <label>End Date
        <input id="endDate" type="date">
      </label>
      <button id="authBtn" type="button" title="Google Auth"><i data-lucide="key-round"></i><span>Auth</span></button>
      <button id="sitesBtn" type="button" title="Load Sites"><i data-lucide="list-tree"></i><span>Sites</span></button>
      <button id="loadBtn" class="primary" type="button" title="Load Data"><i data-lucide="refresh-cw"></i><span>Load</span></button>
    </section>

    <section class="metrics" aria-label="Metrics">
      <article class="metric" style="--accent:#2563eb">
        <div class="metric-head"><span>Total Clicks</span><span class="metric-icon"><i data-lucide="mouse-pointer-click"></i></span></div>
        <div id="totalClicks" class="metric-value">-</div>
      </article>
      <article class="metric" style="--accent:#0f766e">
        <div class="metric-head"><span>Total Impressions</span><span class="metric-icon"><i data-lucide="eye"></i></span></div>
        <div id="totalImpressions" class="metric-value">-</div>
      </article>
      <article class="metric" style="--accent:#b45309">
        <div class="metric-head"><span>CTR</span><span class="metric-icon"><i data-lucide="target"></i></span></div>
        <div id="ctr" class="metric-value">-</div>
      </article>
      <article class="metric" style="--accent:#be123c">
        <div class="metric-head"><span>Avg Position</span><span class="metric-icon"><i data-lucide="map-pin"></i></span></div>
        <div id="position" class="metric-value">-</div>
      </article>
    </section>

    <section class="workspace">
      <section>
        <article class="panel">
          <div class="panel-head">
            <div class="panel-title"><i data-lucide="trending-up"></i><span>Performance Trend</span></div>
            <div class="panel-meta" id="trendMeta">Clicks / Impressions</div>
          </div>
          <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </article>

        <div class="tables">
          <article class="panel">
            <div class="panel-head">
              <div class="panel-title"><i data-lucide="files"></i><span>Top Pages</span></div>
              <div class="panel-meta" id="pagesMeta">Top 50</div>
            </div>
            <div id="topPages" class="table-wrap"><div class="empty">No data</div></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <div class="panel-title"><i data-lucide="search"></i><span>Top Queries</span></div>
              <div class="panel-meta" id="queriesMeta">Top 50</div>
            </div>
            <div id="topQueries" class="table-wrap"><div class="empty">No data</div></div>
          </article>
        </div>
      </section>

      <aside class="side-stack">
        <article class="panel">
          <div class="panel-head">
            <div class="panel-title"><i data-lucide="gauge"></i><span>Low CTR Opportunities</span></div>
            <div class="panel-meta" id="lowCtrMeta">0 rows</div>
          </div>
          <div id="lowCtr" class="table-wrap"><div class="empty">No data</div></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div class="panel-title"><i data-lucide="sparkles"></i><span>Keyword Opportunities</span></div>
            <div class="panel-meta" id="kwMeta">0 rows</div>
          </div>
          <div id="kwOpps" class="table-wrap"><div class="empty">No data</div></div>
        </article>
      </aside>
    </section>
  </main>

  <script>
    const els = {
      authBtn: document.getElementById('authBtn'),
      sitesBtn: document.getElementById('sitesBtn'),
      loadBtn: document.getElementById('loadBtn'),
      siteSelect: document.getElementById('siteSelect'),
      siteUrl: document.getElementById('siteUrl'),
      startDate: document.getElementById('startDate'),
      endDate: document.getElementById('endDate'),
      status: document.getElementById('status'),
      activeProperty: document.getElementById('activeProperty')
    };

    els.authBtn.addEventListener('click', ()=>{ window.location = '/auth'; });
    els.sitesBtn.addEventListener('click', loadSites);
    els.loadBtn.addEventListener('click', loadAll);
    els.siteSelect.addEventListener('change', (event)=>{
      if(event.target.value) {
        els.siteUrl.value = event.target.value;
        updateActiveProperty(event.target.value);
      }
    });
    els.siteUrl.addEventListener('input', ()=> updateActiveProperty(els.siteUrl.value.trim()));

    let chart;

    function boot(){
      setDefaultDates();
      if(window.lucide) lucide.createIcons();
      handleAuthReturn();
      const savedSite = localStorage.getItem('gsc:lastSite');
      if(savedSite) {
        els.siteUrl.value = savedSite;
        updateActiveProperty(savedSite);
      }
    }

    function setDefaultDates(){
      const end = new Date(Date.now() - 2 * 24 * 60 * 60 * 1000);
      const start = new Date(end.getTime() - 28 * 24 * 60 * 60 * 1000);
      els.endDate.value = formatDateInput(end);
      els.startDate.value = formatDateInput(start);
    }

    function formatDateInput(date){
      return date.toISOString().slice(0, 10);
    }

    function formatPct(v){ return (v*100).toFixed(2) + '%'; }
    function formatNumber(v){ return Number(v || 0).toLocaleString(); }
    function handleAuthReturn(){
      const params = new URLSearchParams(window.location.search);
      const auth = params.get('auth');
      if(auth === 'success') {
        setStatus('Google authorization successful. Token saved.', 'success');
        cleanUrl();
      } else if(auth === 'error') {
        setStatus(params.get('message') || 'Google authorization failed.', 'error');
        cleanUrl();
      }
    }

    function cleanUrl(){
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function setStatus(message, type='default'){
      const icon = type === 'error' ? 'circle-alert' : type === 'success' ? 'circle-check' : 'activity';
      els.status.className = `status ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`.trim();
      els.status.innerHTML = `<i data-lucide="${icon}"></i><span>${escapeHtml(message)}</span>`;
      if(window.lucide) lucide.createIcons();
    }

    function setBusy(isBusy){
      els.loadBtn.disabled = isBusy;
      els.sitesBtn.disabled = isBusy;
      els.loadBtn.querySelector('span').textContent = isBusy ? 'Loading' : 'Load';
    }

    function updateActiveProperty(value){
      els.activeProperty.textContent = value || 'No property selected';
    }

    function escapeHtml(value){
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function mkTable(rows, cols){
      if(!rows || rows.length===0) return '<div class="empty">No data</div>';
      const numeric = new Set(['Clicks','Impressions','CTR','Position']);
      let html = '<table><thead><tr>' + cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('') + '</tr></thead><tbody>';
      rows.forEach(r=>{
        html += '<tr>' + cols.map(c=>{
          const value = r[c] == null ? '' : r[c];
          const klass = numeric.has(c) ? ' class="num"' : '';
          return `<td${klass}>${escapeHtml(value)}</td>`;
        }).join('') + '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    async function api(path, params={}){
      const qs = new URLSearchParams(params);
      const url = qs.toString() ? `${path}?${qs.toString()}` : path;
      const res = await fetch(url);
      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (err) {
        data = {error: text};
      }
      if(!res.ok){
        if(res.status===401) alert('未授权：请先点击 Google Auth 完成授权。');
        throw new Error(data.error || `请求失败：HTTP ${res.status}`);
      }
      return data;
    }

    function detectShopifyType(url){
      if(url.includes('/blogs/')) return 'Blog';
      if(url.includes('/collections/')) return 'Collection';
      if(url.includes('/products/')) return 'Product';
      return 'Other';
    }

    async function loadSites(){
      try{
        setBusy(true);
        setStatus('Loading GSC properties...');
        const data = await api('/api/gsc/sites');
        const rows = data.rows || [];
        els.siteSelect.innerHTML = '<option value="">Manual input</option>' + rows.map(site => {
          const label = `${site.siteUrl} (${site.permissionLevel})`;
          return `<option value="${escapeHtml(site.siteUrl)}">${escapeHtml(label)}</option>`;
        }).join('');
        setStatus(`Loaded ${rows.length} GSC properties.`, 'success');
      } catch (err){
        console.error(err);
        setStatus(err.message || '加载 GSC properties 失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    async function loadAll(){
      const siteUrl = els.siteUrl.value.trim();
      if(!siteUrl){ alert('请输入 Site URL'); return; }
      const startDate = els.startDate.value;
      const endDate = els.endDate.value;
      const params = {siteUrl};
      if(startDate) params.startDate = startDate;
      if(endDate) params.endDate = endDate;
      try{
        setBusy(true);
        setStatus('Loading GSC data...');
        updateActiveProperty(siteUrl);
        localStorage.setItem('gsc:lastSite', siteUrl);

        const [trend, pages, queries, pageQuery] = await Promise.all([
          api('/api/gsc/trend', params),
          api('/api/gsc/pages', params),
          api('/api/gsc/queries', params),
          api('/api/gsc/page-query', params)
        ]);

        const trendRows = trend.rows || [];
        const totalClicks = trendRows.reduce((s,r)=>s + (r.clicks||0),0);
        const totalImpr = trendRows.reduce((s,r)=>s + (r.impressions||0),0);
        const avgCtr = totalImpr ? totalClicks/totalImpr : 0;
        const avgPos = trendRows.reduce((s,r)=>s + (r.position||0),0) / Math.max(1, trendRows.length);
        document.getElementById('totalClicks').innerText = formatNumber(totalClicks);
        document.getElementById('totalImpressions').innerText = formatNumber(totalImpr);
        document.getElementById('ctr').innerText = formatPct(avgCtr);
        document.getElementById('position').innerText = avgPos.toFixed(2);

        renderChart(trendRows);

        const topPages = (pages.rows || []).sort((a,b)=>b.impressions - a.impressions).slice(0,50).map(r=>({
          Page:r.page,
          Type: detectShopifyType(r.page),
          Clicks:formatNumber(r.clicks),
          Impressions:formatNumber(r.impressions),
          CTR:(r.ctr*100).toFixed(2)+'%',
          Position: r.position.toFixed(2)
        }));
        document.getElementById('topPages').innerHTML = mkTable(topPages, ['Page','Type','Clicks','Impressions','CTR','Position']);
        document.getElementById('pagesMeta').innerText = `${topPages.length} rows`;

        const topQueries = (queries.rows || []).sort((a,b)=>b.impressions - a.impressions).slice(0,50).map(r=>({
          Query:r.query,
          Clicks:formatNumber(r.clicks),
          Impressions:formatNumber(r.impressions),
          CTR:(r.ctr*100).toFixed(2)+'%',
          Position:r.position.toFixed(2)
        }));
        document.getElementById('topQueries').innerHTML = mkTable(topQueries, ['Query','Clicks','Impressions','CTR','Position']);
        document.getElementById('queriesMeta').innerText = `${topQueries.length} rows`;

        const lowCtrRows = (pageQuery.rows || [])
          .filter(r=>r.impressions >= 500 && r.position <= 12 && (r.ctr*100) < 1.5)
          .sort((a,b)=>b.impressions - a.impressions)
          .slice(0,100)
          .map(r=>({Page:r.page, Query:r.query, Clicks:formatNumber(r.clicks), Impressions:formatNumber(r.impressions), CTR:(r.ctr*100).toFixed(2)+'%', Position:r.position.toFixed(2)}));
        document.getElementById('lowCtr').innerHTML = mkTable(lowCtrRows, ['Page','Query','Clicks','Impressions','CTR','Position']);
        document.getElementById('lowCtrMeta').innerText = `${lowCtrRows.length} rows`;

        const kwRows = (pageQuery.rows || [])
          .filter(r=>r.impressions >= 200 && r.position >= 8 && r.position <= 20)
          .sort((a,b)=>b.impressions - a.impressions)
          .slice(0,100)
          .map(r=>({Page:r.page, Query:r.query, Clicks:formatNumber(r.clicks), Impressions:formatNumber(r.impressions), CTR:(r.ctr*100).toFixed(2)+'%', Position:r.position.toFixed(2)}));
        document.getElementById('kwOpps').innerHTML = mkTable(kwRows, ['Page','Query','Clicks','Impressions','CTR','Position']);
        document.getElementById('kwMeta').innerText = `${kwRows.length} rows`;

        document.getElementById('trendMeta').innerText = `${trendRows.length} days`;
        setStatus('Loaded successfully.', 'success');
      } catch (err){
        console.error(err);
        setStatus(err.message || '加载失败，请查看控制台。', 'error');
      } finally {
        setBusy(false);
      }
    }

    function renderChart(rows){
      const labels = rows.map(r=>r.date);
      const clicksData = rows.map(r=>r.clicks||0);
      const imprData = rows.map(r=>r.impressions||0);
      const ctx = document.getElementById('trendChart').getContext('2d');
      if(chart) chart.destroy();
      chart = new Chart(ctx, {
        type:'line',
        data:{
          labels,
          datasets:[
            {label:'Clicks',data:clicksData,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.10)',tension:.35,borderWidth:2,pointRadius:0,pointHoverRadius:4,fill:true,yAxisID:'y'},
            {label:'Impressions',data:imprData,borderColor:'#0f766e',backgroundColor:'rgba(15,118,110,.08)',tension:.35,borderWidth:2,pointRadius:0,pointHoverRadius:4,fill:true,yAxisID:'y1'}
          ]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{position:'top',align:'end',labels:{usePointStyle:true,boxWidth:8,boxHeight:8}},
            tooltip:{backgroundColor:'#111827',padding:12,cornerRadius:8,displayColors:true}
          },
          scales:{
            x:{grid:{display:false},ticks:{maxRotation:0,color:'#667085'}},
            y:{beginAtZero:true,grid:{color:'#edf1f4'},ticks:{color:'#667085'}},
            y1:{beginAtZero:true,position:'right',grid:{drawOnChartArea:false},ticks:{color:'#667085'}}
          }
        }
      });
    }

    boot();
  </script>
</body>
</html>
